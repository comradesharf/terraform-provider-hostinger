services:
  server:
    image: mockserver/mockserver:latest
    ports:
      - "1234:1234"
    environment:
      MOCKSERVER_LOG_LEVEL: INFO
      MOCKSERVER_SERVER_PORT: 1234
      MOCKSERVER_INITIALIZATION_OPENAPI_PATH: https://raw.githubusercontent.com/hostinger/api/refs/heads/main/openapi.json
